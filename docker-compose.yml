services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: realworld
      POSTGRES_PASSWORD: realworld
      POSTGRES_DB: realworld
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realworld"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://realworld:realworld@db:5432/realworld
      JWT_SECRET: local-dev-secret
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "cd api && npx prisma@4.16.2 db push --schema=src/prisma/schema.prisma --accept-data-loss && node /app/api/main.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/tags 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5